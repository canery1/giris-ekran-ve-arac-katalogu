<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="giris">
        <img src="kullanici.jpg" alt="giriş">
        <h3 class="alt-baslik">Devam Etmek İçin Giriş Yapın</h3>
     <form onsubmit="girisKontrol(event)">
     <div class="input">
        <input type="text" id="username" placeholder="Kullanıcı adı" required>
     </div>
     <div class="input">
        <input type="password" id="password" placeholder="şifre" required>
     </div>
     <p id="HataMesaji" class="hata" ></p>
     <button type="submit" class="giris-buton">GİRİŞ YAP</button>
     </form>
    </div>
    <script>
        function girisKontrol(event){
            event.preventDefault();
            var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;
            var HataMesaji = document.getElementById("HataMesaji");
            if(username === "admin" && password === "12345"){
                window.location.href = "vitrin.html"
            }
            else{
                HataMesaji.innerText = "Hatalı Giriş Yaptınız.";
                HataMesaji.style.display = "block";
                document.getElementById("username").style.borderColor = "red";
                document.getElementById("password").style.borderColor = "red";
            }
        }
    </script>
</body>
</html>
